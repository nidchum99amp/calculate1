<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คำนวณราคาประตูม้วน</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
      min-height: 100vh;
      padding: 16px;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 0;
    }

    .header {
      animation: slideUp 0.6s ease-out;
      width: 100%;
      max-width: 420px;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #000;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      color: #666;
      font-weight: 400;
    }

    .card {
      animation: slideUp 0.7s ease-out;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 24px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(10px);
    }

    .form-section {
      margin-bottom: 28px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #000;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .thickness-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .thickness-btn {
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      background: #fff;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .thickness-btn:hover {
      border-color: #ffd51;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 213, 81, 0.2);
    }

    .thickness-btn.active {
      border-color: #ffd51;
      background: #ffd51;
      color: #000;
      transform: scale(1.02);
    }

    .color-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid #e0e0e0;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .color-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .color-btn.active {
      border-color: #000;
      transform: scale(1.15);
      box-shadow: 0 0 0 2px #fff, 0 4px 12px rgba(0, 0, 0, 0.15);
    }

    .color-checkmark {
      position: absolute;
      bottom: 6px;
      right: 6px;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.9);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      color: #000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .color-btn.active .color-checkmark {
      opacity: 1;
    }

    .image-preview {
      margin: 24px 0;
      text-align: center;
      display: none;
      animation: slideUp 0.5s ease-out;
    }

    .image-preview.show {
      display: block;
    }

    .image-preview img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      max-height: 280px;
      object-fit: cover;
    }

    .size-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .size-inputs input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      background: #fff;
    }

    .size-inputs input:focus {
      border-color: #ffd51;
      box-shadow: 0 0 0 3px rgba(255, 213, 81, 0.1);
      outline: none;
    }

    .calculate-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #ffd51 0%, #ffcc00 100%);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 12px rgba(255, 213, 81, 0.3);
      letter-spacing: 0.5px;
    }

    .calculate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 213, 81, 0.4);
    }

    .calculate-btn:active {
      transform: translateY(0px);
    }

    .result-card {
      animation: slideUp 0.5s ease-out;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
      margin-top: 20px;
      backdrop-filter: blur(10px);
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease-out;
      pointer-events: none;
    }

    .result-card.show {
      opacity: 1;
      pointer-events: auto;
    }

    .result-section {
      margin-bottom: 20px;
    }

    .result-title {
      font-size: 12px;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .result-value {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 16px;
    }

    .result-number {
      font-size: 32px;
      font-weight: 700;
      color: #000;
    }

    .result-unit {
      font-size: 16px;
      color: #666;
      font-weight: 500;
    }

    .price-box {
      background: linear-gradient(135deg, rgba(255, 213, 81, 0.1) 0%, rgba(255, 213, 81, 0.05) 100%);
      border-left: 4px solid #ffd51;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .price-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }

    .price-value {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .price-number {
      font-size: 28px;
      font-weight: 700;
      color: #000;
    }

    .price-unit {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }

    .result-note {
      font-size: 11px;
      color: #999;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>คำนวณราคาประตูม้วน</h1>
      <p>เลือกความหนา ระบุขนาด และคำนวณราคาทันที</p>
    </div>

    <div class="card">
      <!-- Thickness Selection -->
      <div class="form-section">
        <label class="form-label">✦ ความหนาของใบประตู</label>
        <div class="thickness-buttons" id="thicknessButtons"></div>
      </div>

      <!-- Color Selection -->
      <div class="form-section">
        <label class="form-label">✦ เลือกสี</label>
        <div class="color-buttons" id="colorButtons"></div>
      </div>

      <!-- Color Preview Image -->
      <div class="image-preview" id="imagePreview">
        <img id="colorImage" src="" alt="ตัวอย่างประตูม้วน" />
      </div>

      <!-- Size Input -->
      <div class="form-section">
        <label class="form-label">✦ ขนาด (กว้าง × สูง ซม.)</label>
        <div class="size-inputs">
          <input 
            type="number" 
            id="widthInput"
            placeholder="กว้าง (ซม.)"
            step="0.1"
            min="0"
          />
          <input 
            type="number" 
            id="heightInput"
            placeholder="สูง (ซม.)"
            step="0.1"
            min="0"
          />
        </div>
      </div>

      <!-- Calculate Button -->
      <button class="calculate-btn" id="calculateBtn">คำนวณราคา</button>
    </div>

    <!-- Result Display -->
    <div class="result-card" id="resultCard">
      <div class="result-section">
        <p class="result-title">ผลการคำนวณ</p>
        <div class="result-value">
          <span class="result-number" id="areaDisplay">0</span>
          <span class="result-unit">ตร.ม.</span>
        </div>
      </div>

      <div class="price-box">
        <p class="price-label">ราคาเบื้องต้น (ไม่รวมค่าติดตั้ง)</p>
        <div class="price-value">
          <span class="price-number" id="priceDisplay">0</span>
          <span class="price-unit">บาท</span>
        </div>
      </div>

      <p class="result-note">
        💡 ราคานี้เป็นราคาเบื้องต้นเท่านั้น ยังไม่รวมค่าติดตั้งและอื่นๆ
      </p>
    </div>
  </div>

  <script>
    // Data
    const thicknessOptions = [
      { label: '0.38 มิล.', value: '0.38', price: 630 },
      { label: '0.43 มิล.', value: '0.43', price: 650 },
      { label: '0.6 มิล.', value: '0.6', price: 750 }
    ];

    const colorsByThickness = {
      '0.38': [
        { name: 'เทา', value: '#808080', image: 'claude/gray.jpg' },
        { name: 'ครีม', value: '#F5E6D3', image: 'claude/cream.jpg' }
      ],
      '0.43': [
        { name: 'เทา', value: '#808080', image: 'claude/gray.jpg' },
        { name: 'ครีม', value: '#F5E6D3', image: 'claude/cream.jpg' },
        { name: 'แดง', value: '#E63946', image: 'claude/red.jpg' },
        { name: 'ส้ม', value: '#FF9500', image: 'claude/orange.jpg' },
        { name: 'ขาว', value: '#FFFFFF', image: 'claude/white.jpg' },
        { name: 'ดำ', value: '#000000', image: 'claude/black.jpg' },
        { name: 'น้ำเงิน', value: '#003D7A', image: 'claude/navy.jpg' },
        { name: 'ฟ้า', value: '#0088CC', image: 'claude/blue.jpg' },
        { name: 'เขียว', value: '#2D6A4F', image: 'claude/green.jpg' }
      ],
      '0.6': [
        { name: 'เทา', value: '#808080', image: 'claude/gray.jpg' },
        { name: 'ครีม', value: '#F5E6D3', image: 'claude/cream.jpg' }
      ]
    };

    // State
    let state = {
      selectedThickness: '0.38',
      selectedColor: '#808080',
      selectedColorObj: null,
      widthInput: '',
      heightInput: ''
    };

    // DOM Elements
    const thicknessButtons = document.getElementById('thicknessButtons');
    const colorButtons = document.getElementById('colorButtons');
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const calculateBtn = document.getElementById('calculateBtn');
    const resultCard = document.getElementById('resultCard');
    const areaDisplay = document.getElementById('areaDisplay');
    const priceDisplay = document.getElementById('priceDisplay');
    const imagePreview = document.getElementById('imagePreview');
    const colorImage = document.getElementById('colorImage');

    // Render thickness buttons
    function renderThicknessButtons() {
      thicknessButtons.innerHTML = thicknessOptions.map(option => `
        <button class="thickness-btn ${state.selectedThickness === option.value ? 'active' : ''}" data-value="${option.value}">
          ${option.label}
        </button>
      `).join('');

      document.querySelectorAll('.thickness-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const value = btn.dataset.value;
          state.selectedThickness = value;
          state.selectedColor = colorsByThickness[value][0].value;
          state.selectedColorObj = colorsByThickness[value][0];
          renderThicknessButtons();
          renderColorButtons();
          updateImagePreview();
        });
      });
    }

    // Render color buttons
    function renderColorButtons() {
      const colors = colorsByThickness[state.selectedThickness];
      colorButtons.innerHTML = colors.map(color => `
        <button 
          class="color-btn ${state.selectedColor === color.value ? 'active' : ''}" 
          data-value="${color.value}" 
          data-image="${color.image}"
          title="${color.name}"
          style="background-color: ${color.value};"
        >
          <span class="color-checkmark">✓</span>
        </button>
      `).join('');

      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedColor = btn.dataset.value;
          const selectedColorData = colors.find(c => c.value === btn.dataset.value);
          state.selectedColorObj = selectedColorData;
          renderColorButtons();
          updateImagePreview();
        });
      });
    }

    // Update image preview
    function updateImagePreview() {
      if (state.selectedColorObj && state.selectedColorObj.image) {
        colorImage.src = state.selectedColorObj.image;
        imagePreview.classList.add('show');
      }
    }

    // Calculate
    function calculate() {
      const width = parseFloat(widthInput.value);
      const height = parseFloat(heightInput.value);

      if (!widthInput.value || !heightInput.value || width <= 0 || height <= 0) {
        alert('กรุณากรอกขนาดที่ถูกต้อง');
        return;
      }

      const widthM = width / 100;
      const heightM = height / 100;
      const area = Math.round(widthM * heightM * 100) / 100;

      const selectedOption = thicknessOptions.find(opt => opt.value === state.selectedThickness);
      const pricePerSqm = selectedOption.price;
      const totalPrice = Math.round(area * pricePerSqm);

      areaDisplay.textContent = area.toFixed(2);
      priceDisplay.textContent = totalPrice.toLocaleString('th-TH');
      resultCard.classList.add('show');
    }

    // Event listeners
    calculateBtn.addEventListener('click', calculate);
    widthInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') calculate();
    });
    heightInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') calculate();
    });

    // Initialize
    state.selectedColorObj = colorsByThickness['0.38'][0];
    renderThicknessButtons();
    renderColorButtons();
    updateImagePreview();
  </script>
</body>
</html>
